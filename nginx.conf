# Served as /etc/nginx/conf.d/default.conf inside the frontend container.
# Static SPA + reverse proxy to the authoritative Spring Boot backend
# (service name "backend" on the docker-compose default network).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST matchmaking API — path is preserved (/api/... -> backend:8080/api/...).
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # STOMP over native WebSocket (no SockJS).
    location /ws {
        proxy_pass http://backend:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-lived game sockets: do not kill idle connections early
        # (STOMP heartbeats are 10 s, but stay generous).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
