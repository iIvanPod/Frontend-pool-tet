# Served as /etc/nginx/conf.d/default.conf inside the frontend container.
# Static SPA + reverse proxy to the authoritative Spring Boot backend
# deployed on Render (public HTTPS URL below).

# Upstream host in one place. When proxying to an HTTPS upstream we must send
# this exact value as the Host header and enable SNI, or Render's edge cannot
# route the request to the right service.
map $host $backend_host { default backend-pool-test.onrender.com; }

server {
    listen 80;
    server_name _;

    # Render's DNS resolver so the upstream hostname can be re-resolved.
    resolver 8.8.8.8 1.1.1.1 valid=30s;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST matchmaking API — path is preserved (/api/... -> backend /api/...).
    location /api/ {
        proxy_pass https://$backend_host;
        proxy_ssl_server_name on;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # STOMP over native WebSocket (no SockJS).
    location /ws {
        # No URI suffix here: with a variable in proxy_pass nginx forwards the
        # original request URI (/ws) unchanged.
        proxy_pass https://$backend_host;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-lived game sockets: do not kill idle connections early
        # (STOMP heartbeats are 10 s, but stay generous).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
